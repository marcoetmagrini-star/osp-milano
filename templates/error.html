{% extends "base.html" %}
{% block title %}Errore {{ code }}{% end %}
{% block content %}
<div class="flex-center" style="min-height:calc(100vh - 120px);padding:40px 20px">
  <div style="text-align:center;max-width:400px">
    <div style="font-size:64px;margin-bottom:12px">{% if code == 404 %}🔍{% elif code == 403 %}🔒{% else %}⚠️{% end %}</div>
    <h1 style="font-size:28px;font-weight:800;color:#002B61;margin-bottom:8px">Errore {{ code }}</h1>
    <p style="color:#6B7280;font-size:15px;margin-bottom:24px">{{ msg }}</p>
    <a href="/" class="btn btn-primary">← Torna alla Home</a>
  </div>
</div>
{% end %}
